<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Security Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #ffffff;
            padding: 20px;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 5px;
            text-align: center;
        }
        
        .header .subtitle {
            text-align: center;
            opacity: 0.9;
            margin-top: 5px;
        }
        
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: #1a1e3e;
            padding: 25px;
            border-radius: 15px;
            border: 2px solid #667eea;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .stat-card h3 {
            color: #667eea;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 3em;
            font-weight: bold;
            transition: transform 0.3s;
        }
        
        .critical { color: #ff4444; }
        .high { color: #ffaa00; }
        .medium { color: #ffdd00; }
        .low { color: #00ff88; }
        .events { color: #667eea; }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn.active {
            background: linear-gradient(135deg, #00aa00, #00cc00);
        }
        
        .btn.danger {
            background: linear-gradient(135deg, #ff4444, #cc0000);
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            transition: background 0.3s;
        }
        
        .status-dot.active {
            background: #00ff88;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.2); }
        }
        
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-top: 25px;
        }
        
        @media (max-width: 768px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .panel {
            background: #1a1e3e;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #667eea;
        }
        
        .panel h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .alert-item {
            padding: 15px;
            margin: 10px 0;
            border-left: 5px solid;
            background: #0d1128;
            border-radius: 5px;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .alert-item.CRITICAL { 
            border-color: #ff4444; 
            background: rgba(255, 68, 68, 0.1);
        }
        .alert-item.HIGH { 
            border-color: #ffaa00; 
            background: rgba(255, 170, 0, 0.1);
        }
        .alert-item.MEDIUM { 
            border-color: #ffdd00; 
            background: rgba(255, 221, 0, 0.1);
        }
        .alert-item.LOW { 
            border-color: #00ff88; 
            background: rgba(0, 255, 136, 0.1);
        }
        
        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .severity-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .severity-CRITICAL { background: #ff4444; color: white; }
        .severity-HIGH { background: #ffaa00; color: white; }
        .severity-MEDIUM { background: #ffdd00; color: black; }
        .severity-LOW { background: #00ff88; color: black; }
        
        .timestamp {
            color: #888;
            font-size: 0.85em;
        }
        
        .event-list {
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
        }
        
        .event-entry {
            padding: 5px 0;
            border-bottom: 1px solid #1a1e3e;
            word-break: break-all;
        }
        
        .event-entry.suspicious {
            color: #ffaa00;
        }
        
        .event-entry.malicious {
            color: #ff4444;
        }
        
        .event-entry.normal {
            color: #aaa;
        }
        
        .no-data {
            text-align: center;
            padding: 30px;
            color: #888;
            font-style: italic;
        }
        
        .alert-count {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 15px;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #667eea;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛡️ SOC Security Dashboard</h1>
        <div class="subtitle">Real-time Threat Detection & Monitoring</div>
    </div>
    
    <div class="status-grid">
        <div class="stat-card">
            <h3>📊 Total Events</h3>
            <div class="value events" id="totalEvents">0</div>
        </div>
        <div class="stat-card">
            <h3>🚨 Total Alerts</h3>
            <div class="value" id="totalAlerts" style="color: #ffffff;">0</div>
        </div>
        <div class="stat-card">
            <h3>🔴 Critical</h3>
            <div class="value critical" id="criticalCount">0</div>
        </div>
        <div class="stat-card">
            <h3>🟡 High</h3>
            <div class="value high" id="highCount">0</div>
        </div>
    </div>
    
    <div class="controls">
        <button class="btn" id="monitorBtn" onclick="toggleMonitoring()">
            ▶ Start Monitoring
        </button>
        <button class="btn" onclick="refreshData()">
            🔄 Refresh Now
        </button>
        <button class="btn danger" onclick="clearDisplay()">
            🗑️ Clear Display
        </button>
        <div class="status-indicator">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText" style="color: #888;">Disconnected</span>
        </div>
    </div>
    
    <div class="content-grid">
        <div class="panel">
            <h2>🚨 Security Alerts</h2>
            <div class="alert-count" id="alertCount">Loading...</div>
            <div id="alertsContainer">
                <div class="no-data">
                    <div class="spinner"></div>
                    <p style="margin-top: 10px;">Loading alerts...</p>
                </div>
            </div>
        </div>
        
        <div class="panel">
            <h2>📋 Live Event Log</h2>
            <div class="event-list" id="eventsContainer">
                <div class="no-data">
                    <div class="spinner"></div>
                    <p style="margin-top: 10px;">Loading events...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let monitoringInterval = null;
        let isMonitoring = false;
        const API_BASE = window.location.origin;
        
        // Fetch statistics
        async function fetchStats() {
            try {
                const response = await fetch(`${API_BASE}/api/stats`);
                if (!response.ok) throw new Error('Failed to fetch stats');
                
                const stats = await response.json();
                
                document.getElementById('totalEvents').textContent = stats.total_events;
                document.getElementById('totalAlerts').textContent = stats.total_alerts;
                document.getElementById('criticalCount').textContent = stats.critical;
                document.getElementById('highCount').textContent = stats.high;
                
                // Animate numbers
                animateValue('totalEvents', stats.total_events);
                animateValue('totalAlerts', stats.total_alerts);
                animateValue('criticalCount', stats.critical);
                animateValue('highCount', stats.high);
                
                updateStatus(true);
            } catch (error) {
                console.error('Stats error:', error);
                updateStatus(false);
            }
        }
        
        // Fetch alerts
        async function fetchAlerts() {
            try {
                const response = await fetch(`${API_BASE}/api/alerts`);
                if (!response.ok) throw new Error('Failed to fetch alerts');
                
                const alerts = await response.json();
                displayAlerts(alerts);
                updateStatus(true);
            } catch (error) {
                console.error('Alerts error:', error);
                updateStatus(false);
            }
        }
        
        // Fetch events
        async function fetchEvents() {
            try {
                const response = await fetch(`${API_BASE}/api/events`);
                if (!response.ok) throw new Error('Failed to fetch events');
                
                const events = await response.json();
                displayEvents(events);
                updateStatus(true);
            } catch (error) {
                console.error('Events error:', error);
                updateStatus(false);
            }
        }
        
        // Display alerts
        function displayAlerts(alerts) {
            const container = document.getElementById('alertsContainer');
            
            if (!alerts || alerts.length === 0) {
                container.innerHTML = '<div class="no-data">✅ No security alerts detected</div>';
                document.getElementById('alertCount').textContent = 'System is secure';
                return;
            }
            
            document.getElementById('alertCount').textContent = `Showing ${alerts.length} alert(s)`;
            
            // Show latest 20 alerts
            const recentAlerts = alerts.slice(-20).reverse();
            
            let html = '';
            recentAlerts.forEach((alert, index) => {
                html += `
                    <div class="alert-item ${alert.severity}" style="animation-delay: ${index * 0.05}s">
                        <div class="alert-header">
                            <span class="severity-badge severity-${alert.severity}">${alert.severity}</span>
                            <span class="timestamp">${alert.timestamp || 'N/A'}</span>
                        </div>
                        <h4 style="margin-top: 5px;">⚠️ ${alert.rule_name || 'Unknown Alert'}</h4>
                        ${alert.description ? `<p style="color: #aaa; margin-top: 5px;">📝 ${alert.description}</p>` : ''}
                        <p style="color: #888; margin-top: 5px; font-size: 0.9em;">
                            Matched ${alert.matched_count || 0} event(s) | Rule: ${alert.rule_id || 'N/A'}
                        </p>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // Display events
        function displayEvents(events) {
            const container = document.getElementById('eventsContainer');
            
            if (!events || events.length === 0) {
                container.innerHTML = '<div class="no-data">📭 No events recorded yet</div>';
                return;
            }
            
            let html = '';
            events.forEach(event => {
                let eventClass = 'normal';
                
                // Classify events
                if (event.includes('Failed password') || 
                    event.includes('403 Forbidden') ||
                    event.includes('sensitive file')) {
                    eventClass = 'suspicious';
                }
                if (event.includes('malware') || 
                    event.includes('SQL injection') ||
                    event.includes('admin account created')) {
                    eventClass = 'malicious';
                }
                
                html += `<div class="event-entry ${eventClass}">${escapeHtml(event)}</div>`;
            });
            
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }
        
        // Update connection status
        function updateStatus(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (connected) {
                dot.className = 'status-dot active';
                text.textContent = 'Connected';
                text.style.color = '#00ff88';
            } else {
                dot.className = 'status-dot';
                text.textContent = 'Disconnected';
                text.style.color = '#ff4444';
            }
        }
        
        // Toggle monitoring
        function toggleMonitoring() {
            if (isMonitoring) {
                stopMonitoring();
            } else {
                startMonitoring();
            }
        }
        
        function startMonitoring() {
            isMonitoring = true;
            const btn = document.getElementById('monitorBtn');
            btn.textContent = '⏸ Stop Monitoring';
            btn.classList.add('active');
            
            // Fetch immediately
            refreshData();
            
            // Then every 3 seconds
            monitoringInterval = setInterval(refreshData, 3000);
        }
        
        function stopMonitoring() {
            isMonitoring = false;
            const btn = document.getElementById('monitorBtn');
            btn.textContent = '▶ Start Monitoring';
            btn.classList.remove('active');
            
            if (monitoringInterval) {
                clearInterval(monitoringInterval);
                monitoringInterval = null;
            }
        }
        
        function refreshData() {
            fetchStats();
            fetchAlerts();
            fetchEvents();
        }
        
        function clearDisplay() {
            document.getElementById('alertsContainer').innerHTML = 
                '<div class="no-data">🔄 Display cleared - Click Refresh to reload</div>';
            document.getElementById('eventsContainer').innerHTML = 
                '<div class="no-data">🔄 Display cleared - Click Refresh to reload</div>';
            document.getElementById('alertCount').textContent = 'Display cleared';
        }
        
        function animateValue(id, value) {
            const element = document.getElementById(id);
            element.style.transform = 'scale(1.2)';
            setTimeout(() => {
                element.style.transform = 'scale(1)';
            }, 200);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Auto-start monitoring
        window.addEventListener('load', () => {
            console.log('Dashboard loaded, auto-starting monitoring...');
            refreshData();
            startMonitoring();
        });
        
        // Handle errors globally
        window.addEventListener('unhandledrejection', (event) => {
            console.error('Unhandled error:', event.reason);
        });
    </script>
</body>
</html>
